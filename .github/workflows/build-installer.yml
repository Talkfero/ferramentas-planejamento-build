name: Build installer

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Instalador a gerar: all ou uma chave unica (launcher,elexplan,diag,imagedx,unif,coplan_web,cadastro). Capex fundido no coplan_web; Status de Medicao fundido no elexplan."
        required: false
        default: "all"
  push:
    branches: [main, master]
    paths:
      - "multi_apps.spec"
      - "build_all_shared.bat"
      - "Setup_turbinado.iss"
      - "build_gui.py"
      - "requirements.lock.txt"
      - "scripts/**"
      - "app_configs/**"
      - "runtime_hooks/**"
      - ".github/workflows/build-installer.yml"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare app sources
        shell: pwsh
        env:
          BUILD_REPO_READ_TOKEN: ${{ secrets.BUILD_REPO_READ_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPS_TO_BUILD: ${{ github.event.inputs.apps || 'all' }}
        run: |
          .\scripts\prepare_apps.ps1
          python .\scripts\validate_layout.py --apps $env:APPS_TO_BUILD

      - name: Build shared PyInstaller bundle
        shell: cmd
        env:
          APPS_TO_BUILD: ${{ github.event.inputs.apps || 'all' }}
        run: |
          call build_all_shared.bat %APPS_TO_BUILD%

      - name: Finalize bundle runtime configs
        shell: pwsh
        run: |
          .\scripts\finalize_bundle.ps1

      - name: Validate pywebview runtime bundle
        shell: pwsh
        env:
          APPS_TO_BUILD: ${{ github.event.inputs.apps || 'all' }}
        run: |
          .\scripts\validate_runtime_bundle.ps1 -Apps $env:APPS_TO_BUILD

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build per-user installer
        shell: pwsh
        env:
          INSTALLER_APP: ${{ github.event.inputs.apps || 'all' }}
        run: |
          $apps = ($env:INSTALLER_APP ?? "all").Trim().ToLower()
          $args = @(".\Setup_turbinado.iss")
          if ($apps -and $apps -ne "all") {
            if ($apps.Contains(",") -or $apps.Contains(";")) {
              throw "Setup_turbinado.iss suporta instalador parcial de apenas um app por vez. Use apps=all ou uma unica chave."
            }
            $args = @("/DAPP_ONLY=$apps", ".\Setup_turbinado.iss")
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" @args

      - name: Package release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $installer = Get-ChildItem -Path Output\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) { throw "Instalador .exe nao encontrado em Output\" }
          Copy-Item $installer.FullName -Destination release\ -Force
          Write-Host "Instalador: $($installer.Name)"
          if (Test-Path dist\FerramentasCompartilhadas) {
            Compress-Archive -Path dist\FerramentasCompartilhadas\* -DestinationPath release\FerramentasCompartilhadas-portable.zip -Force
          }

      - name: Publish rolling release (replaces previous)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: latest
          INSTALLER_APP: ${{ github.event.inputs.apps || 'all' }}
          BUNDLE_APPS: ${{ github.event.inputs.apps || 'all' }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          # Apaga TODAS as releases existentes para manter somente a mais nova
          $old = gh release list --repo $env:GITHUB_REPOSITORY --limit 200 --json tagName | ConvertFrom-Json
          foreach ($r in $old) {
            Write-Host "Removendo release antiga: $($r.tagName)"
            gh release delete $r.tagName --repo $env:GITHUB_REPOSITORY --cleanup-tag --yes
          }
          $assets = Get-ChildItem release\* | ForEach-Object { $_.FullName }
          $notes = "Build automatico do instalador. Instalador: $($env:INSTALLER_APP). Runtime/bundle: $($env:BUNDLE_APPS). Commit: $($env:COMMIT_SHA). Run: $($env:RUN_ID)."
          $ghArgs = @('release','create',$env:RELEASE_TAG) + $assets + @('--repo',$env:GITHUB_REPOSITORY,'--target',$env:COMMIT_SHA,'--title','Ferramentas de Planejamento - ultimo build','--notes',$notes,'--latest')
          gh @ghArgs
          Write-Host "Release publicada: https://github.com/$($env:GITHUB_REPOSITORY)/releases/tag/$($env:RELEASE_TAG)"

      - name: Cleanup old workflow artifacts
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ids = gh api --paginate "repos/$($env:GITHUB_REPOSITORY)/actions/artifacts" --jq ".artifacts[].id"
          foreach ($id in $ids) {
            if ("$id".Trim()) {
              Write-Host "Apagando artifact $id"
              gh api -X DELETE "repos/$($env:GITHUB_REPOSITORY)/actions/artifacts/$id" 2>$null
            }
          }
