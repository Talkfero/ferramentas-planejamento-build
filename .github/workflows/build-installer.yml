name: Build installer

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps para APPS_TO_BUILD (all ou lista: launcher,elexplan,diag,imagedx,unif,coplan_web,capex,status,cadastro)"
        required: false
        default: "all"
  push:
    branches: [main, master]
    paths:
      - "multi_apps.spec"
      - "build_all_shared.bat"
      - "Setup_turbinado.iss"
      - "build_gui.py"
      - "scripts/**"
      - "app_configs/**"
      - ".github/workflows/build-installer.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare app sources
        shell: pwsh
        env:
          BUILD_REPO_READ_TOKEN: ${{ secrets.BUILD_REPO_READ_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .\scripts\prepare_apps.ps1
          python .\scripts\validate_layout.py --apps "${{ github.event.inputs.apps || 'all' }}"

      - name: Build shared PyInstaller bundle
        shell: cmd
        env:
          APPS_TO_BUILD: ${{ github.event.inputs.apps || 'all' }}
        run: |
          call build_all_shared.bat %APPS_TO_BUILD%

      - name: Finalize bundle runtime configs
        shell: pwsh
        run: |
          .\scripts\finalize_bundle.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build per-user installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\Setup_turbinado.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FerramentasCompartilhadas-Setup
          path: Output\*.exe
          if-no-files-found: error

      - name: Upload raw bundle
        uses: actions/upload-artifact@v4
        with:
          name: FerramentasCompartilhadas-portable
          path: dist\FerramentasCompartilhadas\
          if-no-files-found: error
